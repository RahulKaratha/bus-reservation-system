version: "3.9"

services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    networks:
      - bus-network

  bus-service:
    build: ./services/bus-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - bus-network

  booking-service:
    build: ./services/booking-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      BUS_SERVICE_URL: http://bus-service:5002
      PAYMENT_SERVICE_URL: http://payment-service:5004
    networks:
      - bus-network
    depends_on:
      - bus-service
      - payment-service

  payment-service:
    build: ./services/payment-service
    ports:
      - "5004:5004"
    environment:
      PORT: 5004
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      BOOKING_SERVICE_URL: http://booking-service:5003
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
    networks:
      - bus-network
    depends_on:
      - booking-service
      - notification-service

  user-service:
    build: ./services/user-service
    ports:
      - "5005:5005"
    environment:
      PORT: 5005
      MONGO_URI: ${MONGO_URI}
      AUTH_SERVICE_URL: http://auth-service:5001
    networks:
      - bus-network
    depends_on:
      - auth-service

  notification-service:
    build: ./services/notification-service
    ports:
      - "5006:5006"
    environment:
      PORT: 5006
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    networks:
      - bus-network

  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:5001
      BUS_SERVICE_URL: http://bus-service:5002
      BOOKING_SERVICE_URL: http://booking-service:5003
      PAYMENT_SERVICE_URL: http://payment-service:5004
      USER_SERVICE_URL: http://user-service:5005
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
    networks:
      - bus-network
    depends_on:
      - auth-service
      - bus-service
      - booking-service
      - payment-service
      - user-service
      - notification-service

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - bus-network
    depends_on:
      - api-gateway

networks:
  bus-network:
    driver: bridge
